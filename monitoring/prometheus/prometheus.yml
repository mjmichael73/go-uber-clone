global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api-gateway'
    static_configs:
      - targets: ['api-gateway:9091']

  - job_name: 'user-service'
    static_configs:
      - targets: ['user-service:9091']

  - job_name: 'driver-service'
    static_configs:
      - targets: ['driver-service:9091']

  - job_name: 'ride-service'
    static_configs:
      - targets: ['ride-service:9091']

  - job_name: 'payment-service'
    static_configs:
      - targets: ['payment-service:9091']

  - job_name: 'location-service'
    static_configs:
      - targets: ['location-service:9091']
