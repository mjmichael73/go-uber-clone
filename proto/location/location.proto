syntax = "proto3";

package location;

option go_package = "pkg/pb/location";

import "google/protobuf/timestamp.proto";

service LocationService {
  rpc UpdateLocation(UpdateLocationRequest) returns (UpdateLocationResponse);
  rpc GetLocation(GetLocationRequest) returns (LocationResponse);
  rpc GetNearbyDrivers(GetNearbyRequest) returns (GetNearbyResponse);
  rpc StreamLocation(stream UpdateLocationRequest) returns (stream LocationResponse);
  rpc GetRoute(GetRouteRequest) returns (GetRouteResponse);
  rpc CalculateETA(CalculateETARequest) returns (CalculateETAResponse);
}

message UpdateLocationRequest {
  string entity_id = 1;
  string entity_type = 2;
  double latitude = 3;
  double longitude = 4;
  double heading = 5;
  double speed = 6;
  google.protobuf.Timestamp timestamp = 7;
}

message UpdateLocationResponse {
  bool success = 1;
}

message GetLocationRequest {
  string entity_id = 1;
}

message LocationResponse {
  string entity_id = 1;
  double latitude = 2;
  double longitude = 3;
  double heading = 4;
  double speed = 5;
  google.protobuf.Timestamp last_updated = 6;
}

message GetNearbyRequest {
  double latitude = 1;
  double longitude = 2;
  double radius_km = 3;
  string entity_type = 4;
  int32 limit = 5;
}

message GetNearbyResponse {
  repeated NearbyEntity entities = 1;
}

message NearbyEntity {
  string entity_id = 1;
  double latitude = 2;
  double longitude = 3;
  double distance_km = 4;
}

message GetRouteRequest {
  Coordinate origin = 1;
  Coordinate destination = 2;
}

message GetRouteResponse {
  double distance_km = 1;
  double duration_minutes = 2;
  repeated Coordinate polyline = 3;
}

message CalculateETARequest {
  Coordinate origin = 1;
  Coordinate destination = 2;
}

message CalculateETAResponse {
  double eta_minutes = 1;
  double distance_km = 2;
}

message Coordinate {
  double latitude = 1;
  double longitude = 2;
}